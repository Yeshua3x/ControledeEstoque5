<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Estoque Profissional</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            min-width: 120px;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            display: block;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        .search-filter {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 250px;
            padding: 15px 20px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.1);
        }

        .filter-select {
            padding: 15px 20px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            background: white;
            font-size: 16px;
            cursor: pointer;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(79, 172, 254, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .product-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            border: 1px solid #f0f0f0;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .product-code {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 15px;
            border-radius: 25px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .product-name {
            font-size: 1.4em;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .product-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
        }

        .detail-label {
            font-size: 0.8em;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 1.1em;
            font-weight: 600;
            color: #2c3e50;
        }

        .stock-status {
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85em;
            text-align: center;
        }

        .stock-high { background: #d4edda; color: #155724; }
        .stock-medium { background: #fff3cd; color: #856404; }
        .stock-low { background: #f8d7da; color: #721c24; }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-small {
            padding: 10px 20px;
            font-size: 14px;
            flex: 1;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #7f8c8d;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: 1fr;
            }
            .stats {
                gap: 15px;
            }
            .stat-card {
                min-width: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 Controle de Estoque</h1>
            <p>Gerencie seus produtos de forma simples e eficiente</p>
            <div class="stats">
                <div class="stat-card">
                    <span class="stat-number" id="totalProducts">0</span>
                    <span class="stat-label">Produtos</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="totalStock">0</span>
                    <span class="stat-label">Estoque Total</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="lowStock">0</span>
                    <span class="stat-label">Baixo Estoque</span>
                </div>
            </div>
        </div>

        <div class="content">
            <div class="search-filter">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 Buscar por nome ou código...">
                <select class="filter-select" id="stockFilter">
                    <option value="all">Todos os estoques</option>
                    <option value="high">Estoque alto</option>
                    <option value="medium">Estoque médio</option>
                    <option value="low">Baixo estoque</option>
                </select>
                <button class="btn btn-primary" onclick="downloadJSON()">
                    💾 Baixar estoque.json
                </button>
                <a href="estoque.json" class="btn btn-success" download>📥 Editar JSON</a>
            </div>

            <div id="productsContainer" class="products-grid">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="9" y1="8" x2="9" y2="8"></line>
                        <line x1="15" y1="8" x2="15" y2="8"></line>
                    </svg>
                    <h3>Nenhum produto encontrado</h3>
                    <p>Edite o arquivo <strong>estoque.json</strong> para adicionar produtos</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let products = [];

        // Carrega o estoque do arquivo JSON
        async function loadStock() {
            try {
                const response = await fetch('estoque.json');
                products = await response.json();
                renderProducts();
                updateStats();
            } catch (error) {
                console.error('Erro ao carregar estoque:', error);
                products = [];
                renderProducts();
            }
        }

        // Renderiza os produtos
        function renderProducts() {
            const container = document.getElementById('productsContainer');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filter = document.getElementById('stockFilter').value;

            const filteredProducts = products.filter(product => {
                const matchesSearch = product.nome.toLowerCase().includes(search) || 
                                    product.codigo.toLowerCase().includes(search);
                const stockLevel = getStockLevel(product.quantidade);
                const matchesFilter = filter === 'all' || stockLevel === filter;
                return matchesSearch && matchesFilter;
            });

            if (filteredProducts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="9" y1="8" x2="9" y2="8"></line>
                            <line x1="15" y1="8" x2="15" y2="8"></line>
                        </svg>
                        <h3>Nenhum produto encontrado</h3>
                        <p>Tente ajustar os filtros ou editar o arquivo <strong>estoque.json</strong></p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filteredProducts.map(product => {
                const stockLevel = getStockLevel(product.quantidade);
                return `
                    <div class="product-card">
                        <div class="product-header">
                            <div class="product-code">#${product.codigo}</div>
                            <span class="stock-status stock-${stockLevel}">${stockLevel === 'low' ? '⚠️' : '✅'} ${getStockText(stockLevel)}</span>
                        </div>
                        <h3 class="product-name">${product.nome}</h3>
                        <div class="product-details">
                            <div class="detail-item">
                                <span class="detail-label">Preço Compra</span>
                                <span class="detail-value">R$ ${product.precoCompra.toFixed(2).replace('.', ',')}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Preço Venda</span>
                                <span class="detail-value">R$ ${product.precoVenda.toFixed(2).replace('.', ',')}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Estoque</span>
                                <span class="detail-value">${product.quantidade} un</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Lucro Unit.</span>
                                <span class="detail-value text-success">R$ ${((product.precoVenda - product.precoCompra).toFixed(2)).replace('.', ',')}</span>
                            </div>
                        </div>
                        <div class="actions">
                            <button class="btn btn-small btn-primary">Editar</button>
                            <button class="btn btn-small btn-danger">Remover</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Determina o nível de estoque
        function getStockLevel(quantidade) {
            if (quantidade >= 50) return 'high';
            if (quantidade >= 10) return 'medium';
            return 'low';
        }

        function getStockText(level) {
            const texts = {
                high: 'Estoque Alto',
                medium: 'Estoque Médio',
                low: 'Baixo Estoque'
            };
            return texts[level];
        }

        // Atualiza estatísticas
        function updateStats() {
            const totalProducts = products.length;
            const totalStock = products.reduce((sum, p) => sum + p.quantidade, 0);
            const lowStock = products.filter(p => getStockLevel(p.quantidade) === 'low').length;

            document.getElementById('totalProducts').textContent = totalProducts;
            document.getElementById('totalStock').textContent = totalStock;
            document.getElementById('lowStock').textContent = lowStock;
        }

        // Download do JSON
        function downloadJSON() {
            const dataStr = JSON.stringify(products, null, 2);
            const dataBlob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'estoque.json';
            link.click();
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', renderProducts);
        document.getElementById('stockFilter').addEventListener('change', renderProducts);

        // Auto reload quando o arquivo JSON mudar
        const observer = new MutationObserver(() => {
            loadStock();
        });

        // Inicializa
        loadStock();

        // Verifica mudanças no arquivo a cada 2 segundos
        setInterval(() => {
            fetch('estoque.json', {cache: 'no-cache'})
                .then(() => loadStock())
                .catch(() => {});
        }, 2000);
    </script>
</body>
</html>
